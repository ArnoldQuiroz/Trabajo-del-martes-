{% extends "web/base_publica.html" %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12" x-data="checkoutProcess()">
    <div class="mb-8">
        <a href="{% url 'clientes:carrito' %}"
            class="text-on-surface-variant hover:text-white flex items-center gap-2 mb-6">
            <span class="material-symbols-outlined">arrow_back</span> Volver al Carrito
        </a>
        <h1 class="text-3xl md:text-4xl font-black text-white">Finalizar Pedido</h1>
    </div>

    <template x-if="items.length === 0 && !success">
        <div class="text-center py-20 glass-card rounded-3xl border-dashed">
            <h2 class="text-2xl font-bold text-white mb-4">No hay productos</h2>
            <a href="{% url 'clientes:menu' %}" class="btn-primary px-8 py-3 rounded-full inline-block">Ir al menú</a>
        </div>
    </template>

    <template x-if="success">
        <div
            class="text-center py-20 glass-card rounded-3xl border-secondary/30 shadow-[0_0_50px_rgba(78,222,163,0.1)]">
            <div class="w-20 h-20 bg-secondary/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-secondary text-4xl">check_circle</span>
            </div>
            <h2 class="text-3xl font-black text-white mb-2">¡Pedido Confirmado!</h2>
            <p class="text-on-surface-variant mb-6">Hemos recibido tu orden correctamente. Puedes ver su estado en tu
                panel.</p>
            <a href="{% url 'clientes:mis_reservas' %}" class="btn-primary px-8 py-3 rounded-full inline-block">Ver mi
                cuenta</a>
        </div>
    </template>

    <template x-if="items.length > 0 && !success">
        <div>
            <div class="glass-card rounded-3xl p-6 md:p-8 mb-8">
                <h3 class="text-xl font-bold text-white mb-6">Tus Datos</h3>
                {% if cliente %}
                <p class="text-on-surface-variant mb-6 text-sm">Comprando como: <strong class="text-white">{{
                        cliente.nombres }} {{ cliente.apellidos }}</strong></p>
                {% else %}
                <div class="mb-6">
                    <label class="block text-on-surface-variant text-sm font-bold mb-2">Nombre Completo *</label>
                    <input type="text" x-model="nombreCliente"
                        class="w-full bg-surface/50 border border-white/10 rounded-xl p-4 text-white focus:border-primary focus:ring-1 transition-colors"
                        placeholder="Ingresa tus nombres y apellidos" required>
                </div>
                {% endif %}

                <h3 class="text-xl font-bold text-white mb-6">Tipo de Pedido</h3>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <label
                        class="relative flex flex-col items-center gap-3 p-4 rounded-2xl border-2 cursor-pointer transition-all"
                        :class="tipoPedido === 'LOCAL' ? 'border-primary bg-primary/10' : 'border-white/10 hover:border-white/30'">
                        <input type="radio" name="tipo_pedido" value="LOCAL" x-model="tipoPedido" class="sr-only">
                        <span class="material-symbols-outlined text-3xl"
                            :class="tipoPedido === 'LOCAL' ? 'text-primary' : 'text-on-surface-variant'">restaurant</span>
                        <span class="font-bold text-sm"
                            :class="tipoPedido === 'LOCAL' ? 'text-primary' : 'text-white'">Consumir en Local</span>
                    </label>

                    <label
                        class="relative flex flex-col items-center gap-3 p-4 rounded-2xl border-2 cursor-pointer transition-all"
                        :class="tipoPedido === 'RECOJO' ? 'border-primary bg-primary/10' : 'border-white/10 hover:border-white/30'">
                        <input type="radio" name="tipo_pedido" value="RECOJO" x-model="tipoPedido" class="sr-only">
                        <span class="material-symbols-outlined text-3xl"
                            :class="tipoPedido === 'RECOJO' ? 'text-primary' : 'text-on-surface-variant'">takeout_dining</span>
                        <span class="font-bold text-sm"
                            :class="tipoPedido === 'RECOJO' ? 'text-primary' : 'text-white'">Recojo en Tienda</span>
                    </label>

                    <label
                        class="relative flex flex-col items-center gap-3 p-4 rounded-2xl border-2 cursor-pointer transition-all"
                        :class="tipoPedido === 'DELIVERY' ? 'border-primary bg-primary/10' : 'border-white/10 hover:border-white/30'">
                        <input type="radio" name="tipo_pedido" value="DELIVERY" x-model="tipoPedido" class="sr-only">
                        <span class="material-symbols-outlined text-3xl"
                            :class="tipoPedido === 'DELIVERY' ? 'text-primary' : 'text-on-surface-variant'">moped</span>
                        <span class="font-bold text-sm"
                            :class="tipoPedido === 'DELIVERY' ? 'text-primary' : 'text-white'">Delivery</span>
                    </label>
                </div>

                <h3 class="text-xl font-bold text-white mb-4 mt-8 pt-6 border-t border-white/10">Detalles Adicionales
                </h3>
                <textarea x-model="observaciones" rows="3"
                    class="w-full bg-surface/50 border border-white/10 rounded-xl p-4 text-white placeholder-on-surface-variant focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                    placeholder="Ej: Sin cebolla, o instrucciones para el delivery..."></textarea>
            </div>

            <div class="glass-card rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-white font-bold text-lg">Total a pagar</span>
                    <span class="text-secondary font-black text-2xl">S/ <span x-text="cartTotal"></span></span>
                </div>

                <x-template x-if="errorMsg">
                    <div
                        class="bg-red-500/20 border border-red-500/50 text-red-200 p-4 rounded-xl mb-6 text-sm flex gap-2 items-start">
                        <span class="material-symbols-outlined text-red-400">error</span>
                        <span x-text="errorMsg"></span>
                    </div>
                </x-template>

                <button @click="submitOrder" :disabled="loading"
                    class="btn-primary w-full py-4 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(198,191,255,0.2)] disabled:opacity-50">
                    <span x-show="!loading">Confirmar Pedido</span>
                    <span x-show="loading"
                        class="material-symbols-outlined animate-spin text-xl">progress_activity</span>
                </button>
            </div>
        </div>
    </template>
</div>

<script>
    function checkoutProcess() {
        return {
            tipoPedido: 'RECOJO', // default
            observaciones: '',
            nombreCliente: '',
            loading: false,
            errorMsg: '',
            success: false,

            async submitOrder() {
                if (this.loading) return;
                this.loading = true;
                this.errorMsg = '';

                // Preparar payload
                const payload = {
                    items: this.items.map(i => ({ plato_id: i.id, cantidad: parseInt(i.cantidad) })),
                    tipo_pedido: this.tipoPedido,
                    observaciones: this.observaciones,
                    nombre_cliente: this.nombreCliente
                };

                const hasClienteInfo = document.querySelector('strong.text-white') !== null;
                if (!hasClienteInfo) {
                    if (!this.nombreCliente || this.nombreCliente.trim().length <= 2) {
                        this.errorMsg = "Por favor ingresa tu nombre completo.";
                        this.loading = false;
                        return;
                    }
                }

                try {
                    const res = await fetch("{% url 'api_crear_pedido_web' %}", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Requested-With": "XMLHttpRequest"
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await res.json();

                    if (!result.ok) {
                        this.errorMsg = result.error || "Ocurrió un error al procesar el pedido.";
                    } else {
                        this.success = true;
                        this.items = []; // Limpiar carrito
                    }
                } catch (e) {
                    this.errorMsg = "Error de conexión. Intente nuevamente.";
                } finally {
                    this.loading = false;
                }
            }
        }
    }
</script>
{% endblock %}
