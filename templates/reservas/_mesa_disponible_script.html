<script>
document.addEventListener('DOMContentLoaded', function () {
    const fechaInput = document.querySelector('.reserva-fecha-input, #id_fecha');
    const horaInput = document.querySelector('.reserva-hora-input, #id_hora');
    const mesaSelect = document.querySelector('.reserva-mesa-input, #id_mesa');
    if (!fechaInput || !horaInput || !mesaSelect) return;

    function actualizarMesasDisponibles() {
        const fecha = fechaInput.value;
        const hora = horaInput.value;
        if (!fecha || !hora) {
            mesaSelect.innerHTML = '<option value="">Seleccione fecha y hora primero</option>';
            mesaSelect.disabled = true;
            return;
        }

        mesaSelect.disabled = true;
        mesaSelect.innerHTML = '<option value="">Cargando mesas...</option>';

        const params = new URLSearchParams({ fecha: fecha, hora: hora });
        fetch('/reservas/api/mesas-disponibles/?' + params.toString())
            .then(function (response) { return response.json(); })
            .then(function (data) {
                const valorActual = mesaSelect.value;
                mesaSelect.innerHTML = '<option value="">Seleccione una mesa (opcional)</option>';
                data.mesas.forEach(function (mesa) {
                    const option = document.createElement('option');
                    option.value = mesa.id;
                    option.textContent = mesa.label;
                    mesaSelect.appendChild(option);
                });
                if (valorActual && [...mesaSelect.options].some(function (o) { return o.value === valorActual; })) {
                    mesaSelect.value = valorActual;
                }
                if (data.mesas.length === 0) {
                    mesaSelect.innerHTML = '<option value="">No hay mesas disponibles en ese horario</option>';
                }
                mesaSelect.disabled = false;
            })
            .catch(function () {
                mesaSelect.innerHTML = '<option value="">Error al cargar mesas</option>';
                mesaSelect.disabled = false;
            });
    }

    fechaInput.addEventListener('change', actualizarMesasDisponibles);
    horaInput.addEventListener('change', actualizarMesasDisponibles);
    if (fechaInput.value && horaInput.value) {
        actualizarMesasDisponibles();
    } else {
        mesaSelect.disabled = true;
    }
});
</script>
